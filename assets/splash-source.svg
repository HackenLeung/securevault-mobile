<svg viewBox="0 0 390 844" width="390" height="844" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#2563EB" stop-opacity="1"/>
      <stop offset="100%" stop-color="#1D4ED8" stop-opacity="1"/>
    </linearGradient>
  </defs>

  <!-- Full screen background -->
  <rect width="390" height="844" fill="url(#bgGrad)"/>

  <!-- Vertical key icon -->
  <g transform="translate(195, 330)">
    <circle cx="0" cy="-66" r="72" fill="none" stroke="white" stroke-width="10" opacity="0.92"/>
    <circle cx="0" cy="-66" r="24" fill="white" opacity="0.92"/>
    <rect x="-16" y="4" width="32" height="124" rx="16" fill="white" opacity="0.92"/>
    <rect x="-16" y="68" width="48" height="18" rx="9" fill="white" opacity="0.92"/>
    <rect x="-16" y="92" width="40" height="17" rx="8.5" fill="white" opacity="0.92"/>
  </g>

  <!-- App name -->
  <text x="195" y="510" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="36" font-weight="600" fill="white" letter-spacing="1.5">SecureVault</text>

  <!-- Tagline -->
  <text x="195" y="550" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="16" font-weight="400" fill="white" opacity="0.65" letter-spacing="0.5">Your passwords, secured.</text>

  <!-- Static loading dots -->
  <g transform="translate(195, 630)">
    <circle cx="-20" cy="0" r="5" fill="white" opacity="0.25"/>
